name: ACEest CI/CD Pipeline

on:
  push:
    branches: ["**"]          # Path A: validate every branch push
    tags:
      - "v*.*.*"              # Path B: publish release on semver tags
  pull_request:
    branches: ["**"]

env:
  IMAGE_NAME: aceest-fitness
  IMAGE_TAG: ${{ github.sha }}


jobs:

  lint:
    name: "① Build & Lint"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: flake8 — hard fail on syntax errors
        run: |
          flake8 app.py --count --select=E9,F63,F7,F82 \
            --show-source --statistics
          flake8 app.py --count --exit-zero \
            --max-complexity=12 --max-line-length=100 --statistics

      - name: Verify app imports cleanly
        run: python -c "import app; print('✅ app.py imports OK')"


  test:
    name: "② Automated Testing"
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest with coverage
        run: |
          pytest tests/ -v \
            --tb=short \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=80

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-${{ github.sha }}
          path: coverage.xml


  docker:
    name: "③ Docker Image Assembly & Tests"
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build \
            --tag ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            --tag ${{ env.IMAGE_NAME }}:latest \
            --file Dockerfile .
          echo "✅ Built ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"

      - name: Run pytest inside container
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/tests:/app/tests \
            --entrypoint python \
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            -m pytest tests/ -v --tb=short

      - name: Smoke test — live endpoints
        run: |
          docker run -d --name aceest-smoke -p 5000:5000 \
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          sleep 5
          curl --fail http://localhost:5000/health   && echo "✅ /health OK"
          curl --fail http://localhost:5000/programs && echo "✅ /programs OK"
          docker stop aceest-smoke

      - name: Trivy vulnerability scan (informational)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
          format: "table"
          exit-code: "0"
          severity: "HIGH,CRITICAL"
        continue-on-error: true

      # Export Docker image as tar — only on version tag pushes
      # This tar becomes a downloadable Release asset in Job 4
      - name: Export Docker image tar (tag push only)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          docker save ${{ env.IMAGE_NAME }}:latest \
            | gzip > aceest-fitness-${{ github.ref_name }}.tar.gz
          echo "📦 Exported: aceest-fitness-${{ github.ref_name }}.tar.gz"

      - name: Upload Docker image tar artifact (tag push only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-${{ github.ref_name }}
          path: aceest-fitness-${{ github.ref_name }}.tar.gz
          retention-days: 7


# ─────────────────────────────────────────────────────────────────────────────
# JOB 4 — GITHUB RELEASE + JENKINS TRIGGER
# Runs ONLY when a  v*.*.*  tag is pushed.
# Needs all three previous jobs to pass first.
# ─────────────────────────────────────────────────────────────────────────────
  release:
    name: "④ GitHub Release & Jenkins Trigger"
    runs-on: ubuntu-latest
    needs: docker
    if: startsWith(github.ref, 'refs/tags/v')

    # Must have write permission to create Releases
    permissions:
      contents: write

    steps:
      - name: Checkout full history (needed for changelog generation)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # fetch ALL commits and tags

      # Download the Docker image tar from Job 3
      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image-${{ github.ref_name }}

      # Download the coverage XML from Job 2
      - name: Download coverage report artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-report-${{ github.sha }}

      # ── Auto-generate changelog ─────────────────────────────────────────
      # Reads all commits between the previous tag and this new tag.
      # Writes them into a markdown file used as the Release body.
      - name: Generate changelog from git log
        id: changelog
        run: |
          CURRENT_TAG="${{ github.ref_name }}"

          # Find the tag immediately before the current one
          PREV_TAG=$(git tag --sort=-creatordate \
                     | grep '^v' \
                     | grep -v "^${CURRENT_TAG}$" \
                     | head -1)

          echo "Current tag : ${CURRENT_TAG}"
          echo "Previous tag: ${PREV_TAG:-none}"

          # Build the commit list
          if [ -z "${PREV_TAG}" ]; then
            COMMITS=$(git log --pretty=format:"- %s (%h)" HEAD)
            DIFF_LINE="First release — no previous tag to compare against."
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" \
                      "${PREV_TAG}..${CURRENT_TAG}")
            DIFF_LINE="**Full diff:** [${PREV_TAG} → ${CURRENT_TAG}](https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${CURRENT_TAG})"
          fi

          # Write changelog markdown file
          cat > CHANGELOG_RELEASE.md << EOF
          ## 🏋️ ACEest Fitness & Gym — ${CURRENT_TAG}

          ### What's Changed
          ${COMMITS}

          ---
          ### Release Assets
          | File | Description |
          |------|-------------|
          | \`aceest-fitness-${CURRENT_TAG}.tar.gz\` | Docker image (load with \`docker load\`) |
          | \`coverage.xml\` | Pytest coverage report |

          ---
          ${DIFF_LINE}
          EOF

          echo "--- Generated changelog ---"
          cat CHANGELOG_RELEASE.md

      # ── Create the GitHub Release ───────────────────────────────────────
      # softprops/action-gh-release is the standard community action for this.
      # It uses the built-in GITHUB_TOKEN — no extra secret needed for the
      # release itself.
      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "🏋️ ACEest Fitness ${{ github.ref_name }}"
          body_path: CHANGELOG_RELEASE.md
          draft: false
          # Mark as pre-release if tag contains -rc, -beta, or -alpha
          prerelease: >-
            ${{
              contains(github.ref_name, '-rc')   ||
              contains(github.ref_name, '-beta')  ||
              contains(github.ref_name, '-alpha')
            }}
          files: |
            aceest-fitness-${{ github.ref_name }}.tar.gz
            coverage.xml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Trigger Jenkins BUILD pipeline via webhook ──────────────────────
      # Jenkins receives the release tag + repo details as build parameters.
      # The Jenkinsfile then uses these to checkout exactly the right tag.
      #
      # Jenkins secrets to set in GitHub:
      #   Secret  JENKINS_TOKEN  — Jenkins API token
      # Variables to set in GitHub:
      #   Variable JENKINS_URL   — e.g. http://192.168.1.100:8080
      #   Variable JENKINS_USER  — e.g. admin
      #
      # If JENKINS_URL is not configured the step is skipped gracefully —
      # the release is still published regardless.
      - name: Trigger Jenkins BUILD pipeline
        if: ${{ vars.JENKINS_URL != '' }}
        run: |
          RELEASE_TAG="${{ github.ref_name }}"
          JENKINS_JOB="aceest-pipeline"
          RELEASE_URL="${{ steps.create_release.outputs.url }}"

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🔔  Triggering Jenkins pipeline"
          echo "    Jenkins URL : ${{ vars.JENKINS_URL }}"
          echo "    Job         : ${JENKINS_JOB}"
          echo "    Release tag : ${RELEASE_TAG}"
          echo "    Release URL : ${RELEASE_URL}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          HTTP_STATUS=$(curl \
            --silent \
            --output /tmp/jenkins_response.txt \
            --write-out "%{http_code}" \
            --max-time 20 \
            -X POST \
            "${{ vars.JENKINS_URL }}/job/${JENKINS_JOB}/buildWithParameters" \
            --user "${{ vars.JENKINS_USER }}:${{ secrets.JENKINS_TOKEN }}" \
            --data-urlencode "RELEASE_TAG=${RELEASE_TAG}" \
            --data-urlencode "GITHUB_REPO=${{ github.repository }}" \
            --data-urlencode "RELEASE_URL=${RELEASE_URL}" \
            --data-urlencode "TRIGGERED_BY=github-release-action")

          echo "HTTP Status : ${HTTP_STATUS}"
          echo "Response    : $(cat /tmp/jenkins_response.txt)"

          # HTTP 201 = build queued (standard Jenkins response)
          # HTTP 200 = also acceptable
          if [ "${HTTP_STATUS}" -eq 201 ] || [ "${HTTP_STATUS}" -eq 200 ]; then
            echo "✅ Jenkins build queued successfully!"
          else
            echo "⚠️  Jenkins returned HTTP ${HTTP_STATUS}"
            echo "   Check JENKINS_URL variable and JENKINS_TOKEN secret."
            echo "   The GitHub Release has already been published."
            # Do NOT exit 1 — don't fail the release over Jenkins connectivity
          fi

      # ── Final summary printed to Actions log ───────────────────────────
      - name: Release summary
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🎉 Release ${{ github.ref_name }} published successfully!"
          echo ""
          echo "   GitHub Release URL:"
          echo "   https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}"
          echo ""
          echo "   Attached assets:"
          echo "   • aceest-fitness-${{ github.ref_name }}.tar.gz  (Docker image)"
          echo "   • coverage.xml                                   (Test coverage)"
          echo ""
          echo "   Jenkins build: triggered via webhook (if JENKINS_URL is set)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"