apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-canary-stable
  namespace: __NAMESPACE__
  labels:
    app: aceest-fitness
    strategy: canary
    track: stable
spec:
  replicas: 2
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: aceest-fitness
      strategy: canary
      track: stable
  template:
    metadata:
      labels:
        app: aceest-fitness
        strategy: canary
        track: stable
    spec:
      containers:
        - name: aceest
          image: __STABLE_IMAGE__
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: aceest-runtime-config
          env:
            - name: APP_VERSION
              value: __STABLE_VERSION__
            - name: APP_TRACK
              value: stable
            - name: APP_EXPERIMENT
              value: control
            - name: APP_COLOR
              value: stable
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 20
