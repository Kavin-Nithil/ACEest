apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-blue
  namespace: __NAMESPACE__
  labels:
    app: aceest-fitness
    strategy: blue-green
    color: blue
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: aceest-fitness
      strategy: blue-green
      color: blue
  template:
    metadata:
      labels:
        app: aceest-fitness
        strategy: blue-green
        color: blue
    spec:
      containers:
        - name: aceest
          image: __BLUE_IMAGE__
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: aceest-runtime-config
          env:
            - name: APP_VERSION
              value: __BLUE_VERSION__
            - name: APP_TRACK
              value: blue
            - name: APP_EXPERIMENT
              value: control
            - name: APP_COLOR
              value: blue
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 20
