apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-rolling
  namespace: __NAMESPACE__
  labels:
    app: aceest-fitness
    strategy: rolling
spec:
  replicas: 2
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: aceest-fitness
      strategy: rolling
  template:
    metadata:
      labels:
        app: aceest-fitness
        strategy: rolling
    spec:
      containers:
        - name: aceest
          image: __IMAGE__
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: aceest-runtime-config
          env:
            - name: APP_VERSION
              value: __APP_VERSION__
            - name: APP_TRACK
              value: rolling
            - name: APP_EXPERIMENT
              value: control
            - name: APP_COLOR
              value: rolling
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
